<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경쟁사 가격 모니터링</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f6fa; color: #2d3436; font-size: 13px; display: flex; min-height: 100vh; }

        /* 사이드바 */
        .sidebar { width: 180px; background: #f8f9fa; border-right: 1px solid #e9ecef; padding-top: 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-title { padding: 16px 18px; font-size: 12px; font-weight: 600; color: #888; border-bottom: 1px solid #e9ecef; }
        .sidebar-nav { list-style: none; padding: 8px 0; }
        .sidebar-nav li { }
        .sidebar-nav a { display: block; padding: 10px 18px; color: #666; text-decoration: none; font-size: 14px; font-weight: 500; border-left: 3px solid transparent; }
        .sidebar-nav a:hover { background: #e9ecef; color: #2d3436; }
        .sidebar-nav a.active { color: #2d3436; font-weight: 700; border-left-color: #0984e3; background: #e3f2fd; }

        /* 메인 컨텐츠 */
        .main { flex: 1; margin-left: 180px; }
        .container { margin: 32px; padding: 0 32px; }

        .controls { background: white; border-radius: 8px; padding: 14px 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .controls-row { display: flex; align-items: center; gap: 14px; }
        .btn-update { background: #2d3436; color: white; border: none; padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-update:hover { background: #444; }
        .btn-update:disabled { background: #b2bec3; cursor: not-allowed; }
        .progress-wrap { flex: 1; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0984e3; border-radius: 3px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 12px; color: #999; margin-top: 4px; }
        .meta-line { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f2f6; color: #888; font-size: 12px; }
        .meta-line span { display: inline-block; background: #f1f2f6; padding: 2px 8px; border-radius: 3px; margin-right: 6px; color: #555; }
        .updated-at { float: right; color: #aaa; font-size: 11px; }

        .paper-card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 14px; overflow: hidden; }
        .paper-title { padding: 12px 18px; border-bottom: 1px solid #eee; background: #fafbfc; font-weight: 600; font-size: 14px; }
        .paper-title .partial-tag { display: inline-block; background: #fff3cd; color: #856404; padding: 1px 7px; border-radius: 3px; font-size: 11px; margin-right: 8px; vertical-align: middle; }

        table.grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
        table.grid th, table.grid td { border: 1px solid #eaeaea; padding: 8px 10px; font-size: 12.5px; }
        table.grid thead th { background: #fafafa; color: #666; font-weight: 600; text-align: center; }
        table.grid thead .site-name { font-size: 13px; color: #2d3436; }
        table.grid thead .site-source { font-size: 10.5px; color: #999; font-weight: 400; line-height: 1.4; word-break: break-all; }
        table.grid thead .site-source a { color: #0984e3; text-decoration: none; }
        table.grid thead .site-source a:hover { text-decoration: underline; }
        table.grid thead .site-source a.dead { color: #b2bec3; text-decoration: line-through; }
        table.grid thead .site-source a.dead:hover { text-decoration: line-through underline; }
        table.grid thead .site-source .dead-tag { color: #d63031; font-size: 10px; margin-left: 4px; }
        table.grid .row-side { background: #fafafa; font-weight: 600; text-align: center; color: #555; vertical-align: middle; width: 60px; }
        table.grid .row-qty { background: #fcfcfc; text-align: center; color: #777; width: 70px; }
        table.grid .row-size { background: #fcfcfc; text-align: center; color: #555; font-weight: 500; width: 80px; }
        table.grid .price { text-align: right; font-variant-numeric: tabular-nums; color: #2d3436; }
        table.grid .price.empty { color: #ddd; text-align: center; }
        table.grid .price.base { background: #f7fbff; }
        table.grid .ea-note { font-size: 10px; color: #999; display: block; }

        .loading { text-align: center; padding: 60px; color: #999; }
        .empty { text-align: center; padding: 40px; color: #bbb; }

        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab { background: white; border: none; padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .tab.active { color: #2d3436; border-bottom: 2px solid #2d3436; }
        .change-count { background: #d63031; color: white; padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 4px; }
        .change-count:empty { display: none; }

        table.changes { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        table.changes th, table.changes td { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; font-size: 12.5px; text-align: left; }
        table.changes thead th { background: #fafafa; color: #888; font-weight: 600; }
        table.changes td.price { text-align: right; font-variant-numeric: tabular-nums; }
        .change-up { color: #27ae60; }
        .change-down { color: #d63031; }
    </style>
</head>
<body>
    <!-- 사이드바 -->
    <div class="sidebar">
        <div class="sidebar-title">가격 모니터링</div>
        <ul class="sidebar-nav" id="sidebarNav">
            <li><a href="#" data-category="card_offset" class="active">명함 (오프셋)</a></li>
            <li><a href="#" data-category="card_digital">명함 (디지털)</a></li>
            <li><a href="#" data-category="flyer">합판 전단</a></li>
            <li><a href="#" data-category="sticker">스티커</a></li>
            <li><a href="#" data-category="envelope">봉투</a></li>
        </ul>
    </div>

    <!-- 메인 -->
    <div class="main">
        <div class="container">
            <div class="controls">
                <div class="controls-row">
                    <button class="btn-update" id="btnUpdate" onclick="startCrawl()">가격 업데이트</button>
                    <div class="progress-wrap">
                        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-text" id="progressText"></div>
                    </div>
                </div>
                <div class="meta-line" id="metaLine"></div>
            </div>

            <div class="tabs">
                <button class="tab active" id="tabCompare" onclick="switchTab('compare')">가격 비교</button>
                <button class="tab" id="tabChanges" onclick="switchTab('changes')">가격 변동 <span class="change-count" id="changeCount"></span></button>
            </div>

            <div id="panelCompare">
                <div id="grids"><div class="loading">로딩 중...</div></div>
            </div>

            <div id="panelChanges" style="display:none;">
                <table class="changes">
                    <thead>
                        <tr>
                            <th>사이트</th>
                            <th>용지</th>
                            <th>코팅</th>
                            <th>사이즈</th>
                            <th>매수</th>
                            <th class="price" id="thPast">이전 가격</th>
                            <th class="price" id="thNow">현재 가격</th>
                            <th class="price">변동</th>
                            <th class="price">변동률</th>
                        </tr>
                    </thead>
                    <tbody id="changesBody">
                        <tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;">변동 데이터 없음</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    // 옛 hash (card) 호환 — card 면 card_offset 으로
    let currentCategory = location.hash.replace('#', '') || 'card_offset';
    if (currentCategory === 'card') currentCategory = 'card_offset';

    const META = {
        card_offset: `<span>사이즈: 90x50mm</span>
               <span>인쇄: 양면칼라(8도) / 단면칼라(4도)</span>
               <span>매수: 100 / 200 / 500 / 1000</span>
               <span>평량 오차: ±20g 허용</span>
               <span>가격: 공급가 기준 (부가세 제외)</span>
               <span class="updated-at" id="updatedAt"></span>`,
        card_digital: `<span>사이즈: 90x50mm</span>
               <span>인쇄: 양면칼라 / 단면칼라</span>
               <span>매수: 자동 검출 (사이트별 단위 다름)</span>
               <span>평량 오차: ±20g 허용</span>
               <span>가격: 공급가 기준 (부가세 제외)</span>
               <span class="updated-at" id="updatedAt"></span>`,
        flyer: `<span>사이즈: A2 / A3 / A4 / B3 / B4</span>
                <span>인쇄: 양면칼라 / 단면칼라</span>
                <span>매수: 2000매</span>
                <span>코팅: 비코팅</span>
                <span>평량 오차: ±20g 허용</span>
                <span>가격: 공급가 기준 (부가세 제외)</span>
                <span class="updated-at" id="updatedAt"></span>`,
        sticker: `<span>형태: 원형 도무송</span>
                  <span>매수: 1000매 고정</span>
                  <span>사이즈: 45x45mm ~ 95x95mm</span>
                  <span>평량 오차: ±25g 허용</span>
                  <span>가격: 공급가 기준 (부가세 제외, ÷1.1 변환)</span>
                  <span class="updated-at" id="updatedAt"></span>`,
        envelope: `<span>규격: 대봉투(330x245) / 9절봉투(255x190) / 소봉투(220x105)</span>
                   <span>인쇄: 단면칼라(4도) / 단면흑백(1도)</span>
                   <span>매수: 1000매 고정</span>
                   <span>코팅: 비코팅 고정</span>
                   <span>가격: 공급가 기준 (부가세 제외, ÷1.1 변환)</span>
                   <span class="updated-at" id="updatedAt"></span>`,
    };

    const TITLES = { card_offset: '명함 (오프셋)', card_digital: '명함 (디지털)', flyer: '합판 전단', sticker: '스티커', envelope: '봉투' };

    function fmt(n) {
        if (n == null) return '';
        return Number(n).toLocaleString();
    }

    // 사이트 링크 렌더러 — url_ok=false면 회색/취소선/⚠ 표시
    function renderSiteLink(url, url_ok) {
        if (!url) return '';
        let host;
        try { const u = new URL(url); host = u.host + u.pathname; } catch(e) { host = url.substring(0, 60); }
        if (url_ok === false) {
            return `<a href="${url}" target="_blank" rel="noopener" class="dead" title="링크 응답 없음/404 — 크롤 이후 페이지 삭제·변경 가능성">${host}</a><span class="dead-tag">⚠</span>`;
        }
        return `<a href="${url}" target="_blank" rel="noopener">${host}</a>`;
    }

    // ── 사이드바 클릭 ──
    document.getElementById('sidebarNav').addEventListener('click', (e) => {
        const a = e.target.closest('a[data-category]');
        if (!a) return;
        e.preventDefault();
        const cat = a.dataset.category;
        if (cat === currentCategory) return;
        currentCategory = cat;
        location.hash = cat;
        document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
        a.classList.add('active');
        document.getElementById('metaLine').innerHTML = META[cat] || '';
        loadData();
        loadChanges();
    });

    // ── 명함 그리드 렌더링 ──
    function renderCardGrids(data) {
        const { sites, sides, qtys, papers } = data;
        if (!papers.length) {
            document.getElementById('grids').innerHTML = '<div class="empty">데이터 없음</div>';
            return;
        }
        let html = '';
        for (const paper of papers) {
            html += `<div class="paper-card">
                <div class="paper-title">${paper.paper_name} <span style="color:#888;font-weight:400;">${paper.coating}</span></div>
                <table class="grid"><thead>`;
            // 헤더 row 1: 매수 (rowspan 2) + 사이트명 (colspan 2)
            html += `<tr><th rowspan="2" style="width: 70px;">매수</th>`;
            for (const site of sites) {
                const sd = paper.sites[site.id];
                const product = sd ? sd.product : '';
                const url = sd ? sd.url : site.base_url;
                const vatTag = site.vat_adjusted ? ' <span style="color:#888;font-size:11px;">(VAT ×1.1 보정)</span>' : '';
                const rawPaper = sd ? (sd.raw_paper_name || '') : '';
                const interpNote = sd && sd.interp_note ? sd.interp_note : '';
                html += `<th colspan="${sides.length}">
                    <div class="site-name">${site.name}${vatTag}</div>
                    <div class="site-source">
                        ${product ? product + '<br>' : ''}
                        ${rawPaper ? `<span style="color:#b45309;font-size:11px;">${rawPaper}</span><br>` : ''}
                        ${renderSiteLink(url, sd ? sd.url_ok : undefined)}
                        ${interpNote ? `<br><span style="color:#0984e3;font-size:10px;">${interpNote}</span>` : ''}
                    </div>
                </th>`;
            }
            html += `</tr>`;
            // 헤더 row 2: 단면 / 양면 sub-columns per site
            html += `<tr>`;
            for (let i = 0; i < sites.length; i++) {
                for (const side of sides) {
                    html += `<th class="row-side" style="font-size:12px;">${side}</th>`;
                }
            }
            html += `</tr></thead><tbody>`;
            // 데이터 rows: qty 별
            for (const qty of qtys) {
                html += `<tr><td class="row-qty">${qty}</td>`;
                for (const site of sites) {
                    const sd = paper.sites[site.id];
                    const isBase = site.ownership === 'self';
                    for (const side of sides) {
                        const price = sd ? sd.prices[side]?.[String(qty)] : null;
                        const cls = price == null ? 'price empty' : (isBase ? 'price base' : 'price');
                        html += `<td class="${cls}">${price == null ? '-' : fmt(price)}</td>`;
                    }
                }
                html += '</tr>';
            }
            html += `</tbody></table></div>`;
        }
        document.getElementById('grids').innerHTML = html;
    }

    // ── 합판전단 그리드 렌더링 — paper 별 카드, rows=size, site cell sub-cols=print_mode ──
    function renderFlyerGrids(data) {
        const { sites, sizes, print_modes, qty, papers } = data;
        if (!papers.length) {
            document.getElementById('grids').innerHTML = '<div class="empty">데이터 없음</div>';
            return;
        }
        let html = '';
        for (const paper of papers) {
            html += `<div class="paper-card">
                <div class="paper-title">${paper.paper_name}</div>
                <table class="grid"><thead>`;
            // 헤더 row 1
            html += `<tr><th rowspan="2" style="width: 70px;">사이즈</th>`;
            for (const site of sites) {
                const sd = paper.sites[site.id];
                const product = sd ? sd.product : '';
                const url = sd ? sd.url : site.base_url;
                const rawPaper = sd ? (sd.raw_paper_name || '') : '';
                html += `<th colspan="${print_modes.length}">
                    <div class="site-name">${site.name}</div>
                    <div class="site-source">
                        ${product ? product + '<br>' : ''}
                        ${rawPaper ? `<span style="color:#b45309;font-size:11px;">${rawPaper}</span><br>` : ''}
                        ${renderSiteLink(url, sd ? sd.url_ok : undefined)}
                    </div>
                </th>`;
            }
            html += `</tr><tr>`;
            for (let i = 0; i < sites.length; i++) {
                for (const m of print_modes) {
                    html += `<th class="row-side" style="font-size:12px;">${m}</th>`;
                }
            }
            html += `</tr></thead><tbody>`;
            // 데이터 rows: size 별
            for (const sz of sizes) {
                html += `<tr><td class="row-size">${sz}</td>`;
                for (const site of sites) {
                    const sd = paper.sites[site.id];
                    const isBase = site.ownership === 'self';
                    for (const m of print_modes) {
                        const price = sd ? sd.prices[m]?.[sz] : null;
                        const cls = price == null ? 'price empty' : (isBase ? 'price base' : 'price');
                        html += `<td class="${cls}">${price == null ? '-' : fmt(price)}</td>`;
                    }
                }
                html += '</tr>';
            }
            html += `</tbody></table></div>`;
        }
        document.getElementById('grids').innerHTML = html;
    }

    // ── 스티커 그리드 렌더링 ──
    function renderStickerGrids(data) {
        const { sites, sizes, papers } = data;
        if (!papers.length) {
            document.getElementById('grids').innerHTML = '<div class="empty">데이터 없음. "가격 업데이트"로 크롤링하세요.</div>';
            return;
        }
        let html = '';
        for (const paper of papers) {
            html += `<div class="paper-card">
                <div class="paper-title">${paper.paper_name} <span style="color:#888;font-weight:400;">${paper.coating}</span></div>
                <table class="grid"><thead><tr>
                    <th style="width: 90px;">사이즈</th>`;
            for (const site of sites) {
                const sd = paper.sites[site.id];
                const product = sd ? sd.product : '';
                const url = sd ? sd.url : site.base_url;
                const vatTag = site.vat_adjusted ? ' <span style="color:#888;font-size:11px;">(VAT ×1.1 보정)</span>' : '';
                const rawPaper = sd ? (sd.raw_paper_name || '') : '';
                html += `<th>
                    <div class="site-name">${site.name}${vatTag}</div>
                    <div class="site-source">
                        ${product ? product + '<br>' : ''}
                        ${rawPaper ? `<span style="color:#b45309;font-size:11px;">${rawPaper}</span><br>` : ''}
                        ${renderSiteLink(url, sd ? sd.url_ok : undefined)}
                    </div>
                </th>`;
            }
            html += `</tr></thead><tbody>`;
            for (const size of sizes) {
                html += `<tr><td class="row-size">${size}</td>`;
                for (const site of sites) {
                    const sd = paper.sites[site.id];
                    const priceData = sd ? sd.prices[size] : null;
                    const price = priceData ? priceData.price : null;
                    const ea = priceData ? priceData.ea : 1;
                    const isBase = site.ownership === 'self';
                    const cls = price == null ? 'price empty' : (isBase ? 'price base' : 'price');
                    let display = price == null ? '-' : fmt(price);
                    if (ea > 1 && price != null) {
                        display += `<span class="ea-note">(${ea}EA 보정)</span>`;
                    }
                    html += `<td class="${cls}">${display}</td>`;
                }
                html += '</tr>';
            }
            html += `</tbody></table></div>`;
        }
        document.getElementById('grids').innerHTML = html;
    }

    // ── 봉투 그리드 렌더링 (사이즈별 행, 사이트별 열) ──
    function renderEnvelopeGrids(data) {
        const { sites, sizes, papers } = data;
        if (!papers.length) {
            document.getElementById('grids').innerHTML = '<div class="empty">데이터 없음. "가격 업데이트"로 크롤링하세요.</div>';
            return;
        }
        let html = '';
        for (const paper of papers) {
            html += `<div class="paper-card">
                <div class="paper-title">${paper.paper_name} <span style="color:#888;font-weight:400;">${paper.print_mode || ''}</span></div>
                <table class="grid"><thead><tr>
                    <th style="width: 90px;">사이즈</th>`;
            for (const site of sites) {
                const sd = paper.sites[site.id];
                const product = sd ? sd.product : '';
                const url = sd ? sd.url : site.base_url;
                const vatTag = site.vat_adjusted ? ' <span style="color:#888;font-size:11px;">(VAT ×1.1 보정)</span>' : '';
                const rawPaper = sd ? (sd.raw_paper_name || '') : '';
                html += `<th>
                    <div class="site-name">${site.name}${vatTag}</div>
                    <div class="site-source">
                        ${product ? product + '<br>' : ''}
                        ${rawPaper ? `<span style="color:#b45309;font-size:11px;">${rawPaper}</span><br>` : ''}
                        ${renderSiteLink(url, sd ? sd.url_ok : undefined)}
                    </div>
                </th>`;
            }
            html += `</tr></thead><tbody>`;
            for (const size of sizes) {
                html += `<tr><td class="row-size">${size}</td>`;
                for (const site of sites) {
                    const sd = paper.sites[site.id];
                    const priceData = sd ? sd.prices[size] : null;
                    const price = priceData ? priceData.price : null;
                    const isBase = site.ownership === 'self';
                    const cls = price == null ? 'price empty' : (isBase ? 'price base' : 'price');
                    html += `<td class="${cls}">${price == null ? '-' : fmt(price)}</td>`;
                }
                html += '</tr>';
            }
            html += `</tbody></table></div>`;
        }
        document.getElementById('grids').innerHTML = html;
    }

    // ── 데이터 로드 ──
    async function loadData() {
        try {
            const resp = await fetch(`/api/data/grid?category=${currentCategory}`);
            const data = await resp.json();
            if (data.type === 'sticker') {
                renderStickerGrids(data);
            } else if (data.type === 'envelope') {
                renderEnvelopeGrids(data);
            } else if (data.type === 'flyer') {
                renderFlyerGrids(data);
            } else {
                renderCardGrids(data);
            }
            const updEl = document.getElementById('updatedAt');
            if (updEl) updEl.textContent = data.updated_at ? `최종 업데이트: ${data.updated_at}` : '';
        } catch (e) {
            document.getElementById('grids').innerHTML = `<div class="empty">로딩 실패: ${e}</div>`;
        }
    }

    async function loadChanges() {
        try {
            const resp = await fetch(`/api/data/changes?category=${currentCategory}`);
            const data = await resp.json();
            const changes = data.changes || [];
            document.getElementById('changeCount').textContent = changes.length > 0 ? changes.length : '';
            document.getElementById('thPast').textContent = data.past_time ? `이전 (${data.past_time})` : '이전 가격';
            document.getElementById('thNow').textContent = data.now_time ? `현재 (${data.now_time})` : '현재 가격';
            if (!changes.length) {
                document.getElementById('changesBody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;">가격 변동 없음</td></tr>';
                return;
            }
            let html = '';
            for (const c of changes) {
                const cls = c.direction === 'up' ? 'change-up' : 'change-down';
                const arrow = c.direction === 'up' ? '▲' : '▼';
                const diffStr = c.diff > 0 ? `+${fmt(c.diff)}` : fmt(c.diff);
                html += `<tr>
                    <td>${c.company_name}</td>
                    <td>${c.paper_name}</td>
                    <td>${c.coating}</td>
                    <td>${c.size}</td>
                    <td>${c.qty}</td>
                    <td class="price">${fmt(c.past_price)}</td>
                    <td class="price">${fmt(c.now_price)}</td>
                    <td class="price ${cls}">${diffStr}</td>
                    <td class="price ${cls}">${arrow} ${c.pct}%</td>
                </tr>`;
            }
            document.getElementById('changesBody').innerHTML = html;
        } catch (e) { console.error(e); }
    }

    function switchTab(tab) {
        document.getElementById('tabCompare').classList.toggle('active', tab === 'compare');
        document.getElementById('tabChanges').classList.toggle('active', tab === 'changes');
        document.getElementById('panelCompare').style.display = tab === 'compare' ? '' : 'none';
        document.getElementById('panelChanges').style.display = tab === 'changes' ? '' : 'none';
    }

    function startCrawl() {
        const btn = document.getElementById('btnUpdate');
        btn.disabled = true;
        btn.textContent = '크롤링 중...';
        document.getElementById('progressFill').style.width = '20%';
        fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({category: currentCategory})
        });

        const es = new EventSource('/stream');
        es.onmessage = (event) => {
            const d = JSON.parse(event.data);
            if (d.done) {
                es.close();
                btn.disabled = false;
                btn.textContent = '가격 업데이트';
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = `완료 (${((d.elapsed_sec || 0) / 60).toFixed(1)}분)`;
                setTimeout(() => {
                    loadData();
                    loadChanges();
                    document.getElementById('progressFill').style.width = '0%';
                    document.getElementById('progressText').textContent = '';
                }, 1200);
                return;
            }
            const elapsed = d.elapsed_sec || 0;
            const minutes = (elapsed / 60).toFixed(1);
            document.getElementById('progressText').textContent = `${d.current} | ${minutes}분 경과`;
            document.getElementById('progressFill').style.width = Math.min(20 + elapsed / 2, 95) + '%';
        };
        es.onerror = () => {
            es.close();
            btn.disabled = false;
            btn.textContent = '가격 업데이트';
            document.getElementById('progressText').textContent = '오류';
        };
    }

    // 초기 로드 — hash에 따라 사이드바 활성 + 데이터 로드
    document.querySelectorAll('.sidebar-nav a').forEach(el => {
        el.classList.toggle('active', el.dataset.category === currentCategory);
    });
    document.getElementById('metaLine').innerHTML = META[currentCategory];
    loadData();
    loadChanges();
    </script>
</body>
</html>
