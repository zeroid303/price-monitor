# 프린트시티 사이트 메타. 웹 크롤링 없이 data/printcity/*.xlsx 를 직접 소스로 사용.
# 엑셀 갱신 시 scripts/build_printcity_card_targets.py 재실행 → config/targets/card_{offset,digital}.yaml 의 printcity 섹션 교체.

name: "프린트시티"
