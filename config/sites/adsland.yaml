# 애즈랜드(www.adsland.com) 사이트 기술 상수.

name: "애즈랜드"
base_url: "https://www.adsland.com"
tech: "playwright"
vat_included: false        # bill_ttl_sub(공급가) 직접 추출
locale: "ko-KR"

browser:
  headless: true
  viewport:
    width: 1280
    height: 900

block_patterns:
  - "**/google-analytics.com/**"
  - "**/googletagmanager.com/**"
  - "**/facebook.net/**"
  - "**/facebook.com/tr/**"
  - "**/doubleclick.net/**"
  - "**/criteo.net/**"
  - "**/criteo.com/**"
  - "**/analytics.tiktok.com/**"

# 오프셋 명함 (PHP 서버 렌더링 + inline onchange→smart() 트리거)
# 페이지 page_type 별 분기:
#   - "size_paper_dosu": 스페셜/일반지/친환경 — size×paper×dosu×busu (kind=1)
#   - "size_paper_spot": 567별색 — size×paper×dosu_cover_out×busu (dosu_cover_in='0' 단면 고정)
card_offset:
  selectors:
    size:           "select#size_book"
    paper:          "select[name=paper]"
    dosu:           "select#dosu"
    dosu_cover_out: "select#dosu_cover_out"
    dosu_cover_in:  "select#dosu_cover_in"
    busu:           "select#busu"
    kind:           "select#kind"
    price_supply:   'input[name="bill_ttl_sub"]'   # 공급가 (어댑터 핵심)
    price_tax:      'input[name="bill_tax"]'       # 부가세 (cross-check 용)
    price_total:    'input[name="bill_ttl_fnl"]'   # 결제금액
  timeouts:
    page_goto_ms: 30000
    after_goto_ms: 2500
    after_select_ms: 500
    after_smart_ms: 600
    retry_price_ms: 1500
  low_price_guard:
    floor_abs: 500
    per_qty_multiplier: 3

# 디지털 명함 (Vue.js 2.x SPA + jQuery + axios)
# paperSort[] → paper[] → pweight[] 3단계 Vue 종속 (parent 변경 시 child 동적 갱신)
# 인쇄도수: 이름없는 select 2개 (앞면 / 뒷면) → JS 로 옵션 텍스트 매칭으로 식별
# 모양커팅 페이지는 scBlade A/B/C 필수, 그 외 페이지는 scBlade 없음 또는 '' (없음) fixed
card_digital:
  selectors:
    size:        "select#size_book"
    paperSort:   "select[name='paperSort[]']"
    paper:       "select[name='paper[]']"
    pweight:     "select[name='pweight[]']"
    coat:        "select#coat"
    scBlade:     "select#scBlade"
    busuSelect:  "select#busuSelect"
    kind:        "select#kind"
    price_supply: 'input[name="bill_ttl_sub"]'
    price_tax:    'input[name="bill_tax"]'
    price_total:  'input[name="bill_ttl_fnl"]'
  timeouts:
    page_goto_ms: 30000
    after_goto_ms: 3000
    after_select_ms: 600
    after_paper_chain_ms: 800   # paperSort/paper/pweight 종속 갱신 대기
    after_smart_ms: 700
    retry_price_ms: 1500
  low_price_guard:
    floor_abs: 500
    per_qty_multiplier: 3
