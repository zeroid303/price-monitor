<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경쟁사 가격 모니터링 - 명함</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f6fa; color: #2d3436; font-size: 13px; }
        .header { background: #2d3436; color: white; padding: 14px 24px; }
        .header h1 { font-size: 17px; font-weight: 600; }
        .container { max-width: 1400px; margin: 16px auto; padding: 0 16px; }

        .controls { background: white; border-radius: 8px; padding: 14px 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .controls-row { display: flex; align-items: center; gap: 14px; }
        .btn-update { background: #2d3436; color: white; border: none; padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-update:hover { background: #444; }
        .btn-update:disabled { background: #b2bec3; cursor: not-allowed; }
        .progress-wrap { flex: 1; }
        .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0984e3; border-radius: 3px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 12px; color: #999; margin-top: 4px; }
        .meta-line { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f2f6; color: #888; font-size: 12px; }
        .meta-line span { display: inline-block; background: #f1f2f6; padding: 2px 8px; border-radius: 3px; margin-right: 6px; color: #555; }
        .updated-at { float: right; color: #aaa; font-size: 11px; }

        .paper-card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 14px; overflow: hidden; }
        .paper-title { padding: 12px 18px; border-bottom: 1px solid #eee; background: #fafbfc; font-weight: 600; font-size: 14px; }
        .paper-title .partial-tag { display: inline-block; background: #fff3cd; color: #856404; padding: 1px 7px; border-radius: 3px; font-size: 11px; margin-right: 8px; vertical-align: middle; }

        table.grid { width: 100%; border-collapse: collapse; }
        table.grid th, table.grid td { border: 1px solid #eaeaea; padding: 8px 10px; font-size: 12.5px; }
        table.grid thead th { background: #fafafa; color: #666; font-weight: 600; text-align: center; }
        table.grid thead .site-name { font-size: 13px; color: #2d3436; }
        table.grid thead .site-source { font-size: 10.5px; color: #999; font-weight: 400; line-height: 1.4; word-break: break-all; }
        table.grid thead .site-source a { color: #0984e3; text-decoration: none; }
        table.grid thead .site-source a:hover { text-decoration: underline; }
        table.grid .row-side { background: #fafafa; font-weight: 600; text-align: center; color: #555; vertical-align: middle; width: 60px; }
        table.grid .row-qty { background: #fcfcfc; text-align: center; color: #777; width: 70px; }
        table.grid .price { text-align: right; font-variant-numeric: tabular-nums; color: #2d3436; }
        table.grid .price.empty { color: #ddd; text-align: center; }
        table.grid .price.base { background: #f7fbff; }

        .loading { text-align: center; padding: 60px; color: #999; }
        .empty { text-align: center; padding: 40px; color: #bbb; }

        /* 탭 */
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab { background: white; border: none; padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .tab.active { color: #2d3436; border-bottom: 2px solid #2d3436; }
        .change-count { background: #d63031; color: white; padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 4px; }
        .change-count:empty { display: none; }

        /* 변동 테이블 */
        table.changes { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        table.changes th, table.changes td { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; font-size: 12.5px; text-align: left; }
        table.changes thead th { background: #fafafa; color: #888; font-weight: 600; }
        table.changes td.price { text-align: right; font-variant-numeric: tabular-nums; }
        .change-up { color: #27ae60; }    /* 인상 = 자사에 유리 (초록) */
        .change-down { color: #d63031; }  /* 인하 = 자사에 위험 (빨강) */
    </style>
</head>
<body>
    <div class="header">
        <h1>경쟁사 가격 모니터링 — 명함</h1>
    </div>

    <div class="container">
        <div class="controls">
            <div class="controls-row">
                <button class="btn-update" id="btnUpdate" onclick="startCrawl()">가격 업데이트</button>
                <div class="progress-wrap">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="progress-text" id="progressText">대기 중</div>
                </div>
            </div>
            <div class="meta-line">
                <span>사이즈: 90x50mm</span>
                <span>인쇄: 양면칼라(8도) / 단면칼라(4도)</span>
                <span>매수: 100 / 200 / 500 / 1000</span>
                <span>VAT: 포함 (비즈하우스만 별도, 대시보드 제외)</span>
                <span class="updated-at" id="updatedAt"></span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabCompare" onclick="switchTab('compare')">가격 비교</button>
            <button class="tab" id="tabChanges" onclick="switchTab('changes')">가격 변동 <span class="change-count" id="changeCount"></span></button>
        </div>

        <div id="panelCompare">
            <div id="grids">
                <div class="loading">로딩 중...</div>
            </div>
        </div>

        <div id="panelChanges" style="display:none;">
            <table class="changes">
                <thead>
                    <tr>
                        <th>사이트</th>
                        <th>용지</th>
                        <th>코팅</th>
                        <th>면</th>
                        <th>매수</th>
                        <th class="price" id="thPast">이전 가격</th>
                        <th class="price" id="thNow">현재 가격</th>
                        <th class="price">변동</th>
                        <th class="price">변동률</th>
                    </tr>
                </thead>
                <tbody id="changesBody">
                    <tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;">변동 데이터 없음</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function fmt(n) {
        if (n == null) return '';
        return Number(n).toLocaleString();
    }

    function renderGrids(data) {
        const sites = data.sites;
        const sides = data.sides;
        const qtys = data.qtys;

        if (!data.papers.length) {
            document.getElementById('grids').innerHTML = '<div class="empty">데이터 없음. "가격 업데이트" 클릭으로 크롤링하세요.</div>';
            return;
        }

        let html = '';
        for (const paper of data.papers) {
            const tag = paper.partial_coating ? '<span class="partial-tag">부분코팅</span>' : '';
            html += `<div class="paper-card">
                <div class="paper-title">${tag}${paper.paper_name} <span style="color:#888;font-weight:400;">${paper.coating}</span></div>
                <table class="grid">
                    <thead>
                        <tr>
                            <th rowspan="2" colspan="2">면 / 매수</th>`;
            for (const site of sites) {
                const siteData = paper.sites[site.id];
                const product = siteData ? siteData.product : '';
                const url = siteData ? siteData.url : site.base_url;
                html += `<th>
                    <div class="site-name">${site.name}</div>
                    <div class="site-source">
                        ${product ? product + '<br>' : ''}
                        ${url ? `<a href="${url}" target="_blank" rel="noopener">${(() => { const u = new URL(url); return u.host + u.pathname; })()}</a>` : ''}
                    </div>
                </th>`;
            }
            html += `</tr></thead><tbody>`;

            for (const side of sides) {
                qtys.forEach((qty, i) => {
                    html += '<tr>';
                    if (i === 0) {
                        html += `<td class="row-side" rowspan="${qtys.length}">${side}</td>`;
                    }
                    html += `<td class="row-qty">${qty}</td>`;
                    for (const site of sites) {
                        const siteData = paper.sites[site.id];
                        const price = siteData ? siteData.prices[side]?.[String(qty)] : null;
                        const isBase = site.ownership === 'self';
                        const cls = price == null ? 'price empty' : (isBase ? 'price base' : 'price');
                        html += `<td class="${cls}">${price == null ? '-' : fmt(price)}</td>`;
                    }
                    html += '</tr>';
                });
            }

            html += `</tbody></table></div>`;
        }
        document.getElementById('grids').innerHTML = html;
        document.getElementById('updatedAt').textContent = data.updated_at ? `최종 업데이트: ${data.updated_at}` : '';
    }

    async function loadData() {
        try {
            const resp = await fetch('/api/data/grid');
            const data = await resp.json();
            renderGrids(data);
        } catch (e) {
            document.getElementById('grids').innerHTML = `<div class="empty">로딩 실패: ${e}</div>`;
        }
    }

    async function loadChanges() {
        try {
            const resp = await fetch('/api/data/changes');
            const data = await resp.json();
            const changes = data.changes || [];
            document.getElementById('changeCount').textContent = changes.length > 0 ? changes.length : '';
            document.getElementById('thPast').textContent = data.past_time ? `이전 (${data.past_time})` : '이전 가격';
            document.getElementById('thNow').textContent = data.now_time ? `현재 (${data.now_time})` : '현재 가격';
            if (!changes.length) {
                document.getElementById('changesBody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;">가격 변동 없음</td></tr>';
                return;
            }
            const side = (pm) => pm.startsWith('양면') ? '양면' : (pm.startsWith('단면') ? '단면' : pm);
            let html = '';
            for (const c of changes) {
                const cls = c.direction === 'up' ? 'change-up' : 'change-down';
                const arrow = c.direction === 'up' ? '▲' : '▼';
                const diffStr = c.diff > 0 ? `+${fmt(c.diff)}` : fmt(c.diff);
                const partial = c.partial_coating ? '<span class="partial-tag" style="margin-left:4px;">부분코팅</span>' : '';
                html += `<tr>
                    <td>${c.company_name}</td>
                    <td>${c.paper_name}${partial}</td>
                    <td>${c.coating}</td>
                    <td>${side(c.print_mode)}</td>
                    <td>${c.qty}</td>
                    <td class="price">${fmt(c.past_price)}</td>
                    <td class="price">${fmt(c.now_price)}</td>
                    <td class="price ${cls}">${diffStr}</td>
                    <td class="price ${cls}">${arrow} ${c.pct}%</td>
                </tr>`;
            }
            document.getElementById('changesBody').innerHTML = html;
        } catch (e) {
            console.error(e);
        }
    }

    function switchTab(tab) {
        document.getElementById('tabCompare').classList.toggle('active', tab === 'compare');
        document.getElementById('tabChanges').classList.toggle('active', tab === 'changes');
        document.getElementById('panelCompare').style.display = tab === 'compare' ? '' : 'none';
        document.getElementById('panelChanges').style.display = tab === 'changes' ? '' : 'none';
    }

    function startCrawl() {
        const btn = document.getElementById('btnUpdate');
        btn.disabled = true;
        btn.textContent = '크롤링 중...';
        document.getElementById('progressFill').style.width = '20%';
        fetch('/api/start', { method: 'POST' });

        const es = new EventSource('/stream');
        es.onmessage = (event) => {
            const d = JSON.parse(event.data);
            if (d.done) {
                es.close();
                btn.disabled = false;
                btn.textContent = '가격 업데이트';
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = `완료 (${d.elapsed_sec || 0}초)`;
                setTimeout(() => {
                    loadData();
                    loadChanges();
                    document.getElementById('progressFill').style.width = '0%';
                    document.getElementById('progressText').textContent = '대기 중';
                }, 1200);
                return;
            }
            const elapsed = d.elapsed_sec || 0;
            document.getElementById('progressText').textContent = `${d.current} | ${elapsed}초 경과`;
            document.getElementById('progressFill').style.width = Math.min(20 + elapsed, 90) + '%';
        };
        es.onerror = () => {
            es.close();
            btn.disabled = false;
            btn.textContent = '가격 업데이트';
            document.getElementById('progressText').textContent = '오류';
        };
    }

    loadData();
    loadChanges();
    </script>
</body>
</html>
