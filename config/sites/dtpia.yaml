# 디티피아(dtpia.co.kr) 사이트 기술 상수.
# 어댑터(adapters/dtpia_*.py)가 이 설정을 읽어 DOM 조작에 사용.
# 사이트가 HTML 개편하면 이 파일만 수정 — 파이썬 코드는 건드리지 않음.

name: "디티피아"
base_url: "https://dtpia.co.kr"
tech: "playwright"
vat_included: false        # raw 에 공급가액(VAT 제외) 만 기록
locale: "ko-KR"

browser:
  headless: true
  viewport:
    width: 1280
    height: 900

# 광고/트래커 차단 (페이지 로딩 가속)
block_patterns:
  - "**/google-analytics.com/**"
  - "**/googletagmanager.com/**"
  - "**/facebook.net/**"
  - "**/facebook.com/tr/**"
  - "**/doubleclick.net/**"
  - "**/criteo.net/**"
  - "**/criteo.com/**"
  - "**/analytics.tiktok.com/**"

# 카테고리별 DOM 셀렉터 + 타임아웃.
# 사이트 DOM이 카테고리(오프셋 명함 / 디지털 명함 / 봉투 등)마다 다를 수 있어 섹션 분리.

# 오프셋 명함 — Color.aspx (일반) · Special.aspx (고급지) · Uv.aspx (UV옵셋)
card_offset:
  selectors:
    # 가격 표시 (VAT 포함 총 결제금액)
    price: "est_scroll_ord_am"      # 공급가액 (VAT 제외). est_scroll_total_am 은 합계, est_scroll_vat_am 은 부가세
    # 페이지별 option dropdown id
    coating_type: "coating_type"    # color page: paper×coating 결합 dropdown
    mtrl_cd: "mtrl_cd"              # special/uv page: 용지 코드
    mtrl_cdw: "mtrl_cdw"            # special/uv page: 평량
    color_mode: "prn_clr_cn_gb"     # 인쇄도수
    size: "ppr_cut_tmp"             # 사이즈
    qty: "prn_sht_cn"               # 수량
  timeouts:
    page_goto_ms: 30000
    after_goto_ms: 2500
    after_select_ms: 500
    after_color_ms: 400
    after_qty_ms: 300
    after_price_trigger_ms: 900
    retry_price_ms: 1500
  # 비정상 저가 방어: price < max(500, qty * 3) 이면 callPrice 재시도
  low_price_guard:
    floor_abs: 500
    per_qty_multiplier: 3

# 디지털 명함 — SmallQuantity.aspx (소량) · Indigo.aspx (인디고)
# 두 페이지 공통: paper select + weight select 두 개 (id 만 다름 — target 의 sel_a/sel_b 로 명시)
#   소량명함: mtrl_cd_01 + mtrl_cd_02
#   인디고:   mtrl_01    + mtrl_02
card_digital:
  selectors:
    price: "est_scroll_ord_am"      # 공급가액 (VAT 제외). est_scroll_total_am 은 합계, est_scroll_vat_am 은 부가세
    # 소량명함용 (target 에서 sel_a/sel_b 로 명시 안 하면 fallback)
    mtrl_cd_01: "mtrl_cd_01"
    mtrl_cd_02: "mtrl_cd_02"
    # 인디고용
    mtrl_01: "mtrl_01"
    mtrl_02: "mtrl_02"
    coating_type: "coating_type"    # 소량명함: N(안함)/1/3/2/4. 인디고는 select 자체가 없을 수도
    color_mode: "prn_clr_cn_gb"
    size: "ppr_cut_tmp"
    qty: "prn_sht_cn"
  timeouts:
    page_goto_ms: 30000
    after_goto_ms: 2500
    after_select_ms: 500
    after_color_ms: 400
    after_qty_ms: 300
    after_price_trigger_ms: 900
    retry_price_ms: 1500
  low_price_guard:
    floor_abs: 500
    per_qty_multiplier: 3

# 합판 전단지
flyer:
  selectors:
    mtrl_cd: mtrl_cd
    sdiv: sdiv
    sdiv_cd: sdiv_cd
    color_mode: prn_clr_cn_gb
    qty: ream_cn
    price: est_scroll_ord_am
  timeouts:
    page_goto_ms: 30000
    after_goto_ms: 2500
    after_select_ms: 500
    after_qty_ms: 400
    after_price_trigger_ms: 900
    retry_price_ms: 1500
  low_price_guard:
    floor_abs: 5000
    per_qty_multiplier: 5
